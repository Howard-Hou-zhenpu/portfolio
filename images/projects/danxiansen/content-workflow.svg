  <!-- Title block -->
  <text x="60" y="74" font-family="'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Noto Sans SC', system-ui, -apple-system, sans-serif" font-size="36" font-weight="600" fill="#171717">AI 内容生产与跨境增长工作流</text>
  <text x="60" y="106" font-family="'SF Mono', 'JetBrains Mono', 'Consolas', 'Menlo', monospace" font-size="15" fill="#737373" letter-spacing="0.5">AI-assisted content workflow for cross-border e-commerce</text>

  <!-- Card 01 -->
  <g>
    <rect x="60" y="150" width="280" height="280" rx="6" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    <rect x="60" y="150" width="280" height="8" rx="6" fill="#7B95B2"/>
    <text x="84" y="194" font-family="'SF Mono', 'JetBrains Mono', 'Consolas', 'Menlo', monospace" font-size="13" fill="#A3A3A3" letter-spacing="2">01.</text>
