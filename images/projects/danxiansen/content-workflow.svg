    <text x="98" y="236" font-family="'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Noto Sans SC', system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#171717">商品与品牌输入</text>
    <line x1="84" y1="260" x2="316" y2="260" stroke="#EEEEEE" stroke-width="1"/>
