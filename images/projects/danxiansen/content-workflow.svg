<svg viewBox="0 0 1280 475" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dotGrid" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="#D4D4D4" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="475" fill="#FAFAF9"/>
  <rect width="1280" height="475" fill="url(#dotGrid)"/>

  <!-- Decorative node cluster top-left -->
  <g opacity="0.6">
    <circle cx="40" cy="40" r="2.5" fill="#D4D4D4"/>
    <circle cx="58" cy="35" r="2.5" fill="#D4D4D4"/>
    <circle cx="52" cy="52" r="2.5" fill="#D4D4D4"/>
    <line x1="40" y1="40" x2="58" y2="35" stroke="#D4D4D4" stroke-width="0.6"/>
    <line x1="40" y1="40" x2="52" y2="52" stroke="#D4D4D4" stroke-width="0.6"/>
  </g>

  <!-- Decorative node cluster bottom-right -->
  <g opacity="0.6">
    <circle cx="1240" cy="450" r="2.5" fill="#D4D4D4"/>
    <circle cx="1222" cy="445" r="2.5" fill="#D4D4D4"/>
    <circle cx="1228" cy="460" r="2.5" fill="#D4D4D4"/>
