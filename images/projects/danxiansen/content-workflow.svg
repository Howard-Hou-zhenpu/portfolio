    <text x="998" y="349" font-family="'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Noto Sans SC', system-ui, -apple-system, sans-serif" font-size="16" fill="#262626">本地化卖点文案</text>
