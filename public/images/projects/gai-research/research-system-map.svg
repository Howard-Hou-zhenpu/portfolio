    <circle cx="772" cy="328" r="2" fill="#8FAB8A"/>
    <circle cx="790" cy="328" r="1.6" fill="#A3A3A3"/>
    <circle cx="808" cy="328" r="2" fill="#A89060"/>
  </g>

  <g id="card-output">
    <rect x="820" y="180" width="320" height="296" rx="6" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    <line x1="820" y1="180" x2="880" y2="180" stroke="#A89060" stroke-width="2"/>
    <text class="mono" x="844" y="222" font-size="11" font-weight="500" fill="#A3A3A3" letter-spacing="2">03.</text>
    <circle cx="848" cy="256" r="3.5" fill="#A89060"/>
    <text class="cn" x="860" y="261" font-size="20" font-weight="600" fill="#171717">研究输出</text>
