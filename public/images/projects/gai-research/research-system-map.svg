    </g>
    <g transform="translate(464, 418)">
      <rect x="0" y="-5" width="6" height="1.5" fill="#8FAB8A"/>
      <text class="cn" x="14" y="0" font-size="14" font-weight="400" fill="#262626">SEM / SmartPLS</text>
    </g>
  </g>

