    </g>
    <text class="cn" x="42" y="27" font-size="13" font-weight="600" fill="#171717">全国一等奖</text>
    <line x1="120" y1="12" x2="120" y2="30" stroke="#E5E5E5" stroke-width="1"/>
    <text class="cn" x="130" y="26" font-size="12" font-weight="400" fill="#525252">第16届全国市场调查与分析大赛</text>
  </g>

  <line x1="60" y1="148" x2="1140" y2="148" stroke="#D4D4D4" stroke-width="1" stroke-dasharray="1 5"/>

  <g id="card-input">
    <rect x="60" y="180" width="320" height="296" rx="6" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    <line x1="60" y1="180" x2="120" y2="180" stroke="#7B95B2" stroke-width="2"/>
    <text class="mono" x="84" y="222" font-size="11" font-weight="500" fill="#A3A3A3" letter-spacing="2">01.</text>
    <circle cx="88" cy="256" r="3.5" fill="#7B95B2"/>
