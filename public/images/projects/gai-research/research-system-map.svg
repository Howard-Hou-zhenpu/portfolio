<svg width="1200" height="540" viewBox="0 0 1200 540" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <pattern id="dotGrid" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="#D4D4D4" opacity="0.45"/>
    </pattern>
    <style>
      .cn { font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', 'Noto Sans SC', system-ui, -apple-system, sans-serif; }
      .mono { font-family: 'SF Mono', 'JetBrains Mono', 'Consolas', 'Menlo', monospace; }
    </style>
  </defs>

  <rect width="1200" height="540" fill="#FAFAF9"/>
  <rect width="1200" height="540" fill="url(#dotGrid)"/>

  <g opacity="0.6">
    <line x1="32" y1="32" x2="48" y2="50" stroke="#D4D4D4" stroke-width="0.6"/>
    <line x1="48" y1="50" x2="22" y2="58" stroke="#D4D4D4" stroke-width="0.6"/>
    <circle cx="32" cy="32" r="2" fill="#7B95B2"/>
    <circle cx="48" cy="50" r="1.4" fill="#A3A3A3"/>
    <circle cx="22" cy="58" r="1.4" fill="#A3A3A3"/>
  </g>

  <g opacity="0.6">
    <line x1="1170" y1="488" x2="1154" y2="506" stroke="#D4D4D4" stroke-width="0.6"/>
    <line x1="1154" y1="506" x2="1182" y2="514" stroke="#D4D4D4" stroke-width="0.6"/>
    <circle cx="1170" cy="488" r="2" fill="#8FAB8A"/>
    <circle cx="1154" cy="506" r="1.4" fill="#A3A3A3"/>
    <circle cx="1182" cy="514" r="1.4" fill="#A3A3A3"/>
