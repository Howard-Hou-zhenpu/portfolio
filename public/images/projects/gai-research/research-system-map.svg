    <line x1="440" y1="180" x2="500" y2="180" stroke="#8FAB8A" stroke-width="2"/>
    <text class="mono" x="464" y="222" font-size="11" font-weight="500" fill="#A3A3A3" letter-spacing="2">02.</text>
